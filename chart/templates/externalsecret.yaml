{{- if .Values.externalSecret.enabled }}
# Optional: materialize the Slack bot token Secret from AWS SSM via ESO.
# Off by default (design manages ESO separately in k8s-dobbolab). Requires the
# External Secrets Operator CRDs.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.slackBotToken.existingSecret }}
  labels:
    {{- include "alert-thread-proxy.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.slackBotToken.existingSecret }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.slackBotToken.secretKey }}
      remoteRef:
        key: {{ .Values.externalSecret.remoteKey }}
{{- end }}
